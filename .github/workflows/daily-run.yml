name: 量化投资简报

on:
  schedule:
    # 北京时间 = UTC + 8，所有 cron 在整点前后 7-37 分钟错峰
    - cron: '37 0 * * 1-5'     # 08:37 BJT  早间：美股昨夜复盘
    - cron: '23 3 * * 1-5'     # 11:23 BJT  午间：行情异动 + 新闻
    - cron: '17 6 * * 1-5'     # 14:17 BJT  收盘前：全资产偏离度 + 死结论
    - cron: '7 12 * * 1-5'     # 20:07 BJT  夜盘：美股前瞻
    - cron: '37 0 * * 6'       # 周六 08:37  周五美股收盘复盘
    - cron: '7 12 * * 0'       # 周日 20:07  周末宏观总结 + 周一前瞻

  workflow_dispatch:
    inputs:
      mode:
        description: '手动运行模式'
        required: true
        default: 'closing'
        type: choice
        options:
          - morning        # 早间复盘
          - midday          # 午间异动
          - closing         # 收盘前指令
          - evening         # 夜盘前瞻
          - sat_morning     # 周六美股复盘
          - sun_evening     # 周日宏观总结
          - notify          # 完整日报（数据卡 + AI 报告）

concurrency:
  group: quant-daily-run
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs

      - name: 运行
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_TOKEN: ${{ secrets.FEISHU_BITABLE_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LOG_LEVEL: INFO
        run: |
          # ── 确定模式 ──
          MODE="${{ github.event.inputs.mode || '' }}"
          if [ -z "$MODE" ]; then
            HOUR=$(TZ='Asia/Shanghai' date '+%H')
            DAY=$(TZ='Asia/Shanghai' date '+%u')   # 1=Mon … 7=Sun
            if [ "$DAY" = "6" ]; then
              MODE="sat_morning"
            elif [ "$DAY" = "7" ]; then
              MODE="sun_evening"
            elif [ "$HOUR" -ge 5 ] && [ "$HOUR" -lt 10 ]; then
              MODE="morning"
            elif [ "$HOUR" -ge 10 ] && [ "$HOUR" -lt 13 ]; then
              MODE="midday"
            elif [ "$HOUR" -ge 13 ] && [ "$HOUR" -lt 16 ]; then
              MODE="closing"
            else
              MODE="evening"
            fi
          fi

          echo "=========================================="
          echo "  AI 量化投资系统"
          echo "=========================================="
          echo "北京时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "星期: $(TZ='Asia/Shanghai' date '+%u')"
          echo "模式: $MODE"
          echo ""

          # ── Step 0: Pending 交易确认（每天每条管线都跑） ──
          python -m src.pending_resolver

          # ── Step 1: 按模式路由 ──
          case "$MODE" in
            notify)
              python -m src.notify
              ;;
            *)
              python -m src.briefing "$MODE"
              ;;
          esac

      - name: 完成
        if: always()
        run: |
          echo ""
          echo "执行完成 @ $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
