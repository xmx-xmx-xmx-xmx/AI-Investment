name: 量化投资简报

on:
  # ═══════════════════════════════════════
  # 定时触发 —— 四个时段，周一到周五
  # 北京时间 = UTC + 8
  # ═══════════════════════════════════════
  schedule:
    - cron: '0 1 * * 1-5'     # 09:00 北京时间：早间简报（美股昨夜复盘）
    - cron: '0 4 * * 1-5'     # 12:00 北京时间：午间快讯
    - cron: '30 6 * * 1-5'    # 14:30 北京时间：收盘前终极指令
    - cron: '0 11 * * 1-5'    # 19:00 北京时间：夜盘前瞻

  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式（手动触发时选择）'
        required: true
        default: '14:30'
        type: choice
        options:
          - '09:00'   # 早间简报
          - '12:00'   # 午间快讯
          - '14:30'   # 收盘前指令
          - '19:00'   # 夜盘前瞻
          - notify     # 完整日报（数据卡 + AI 分析）

concurrency:
  group: quant-daily-run
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 随机延迟（避免固定时间集中请求）
        run: sleep $((RANDOM % 45))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs

      - name: 执行简报
        env:
          # ── 大模型 ──
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}

          # ── 飞书多维表格 ──
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_TOKEN: ${{ secrets.FEISHU_BITABLE_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}

          # ── 飞书群推送 ──
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}

          # ── 新闻搜索（可选） ──
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

          # ── 系统 ──
          LOG_LEVEL: INFO

        run: |
          # 确定运行模式：cron 按时间自动选，手动触发时用用户选的
          CURRENT_HOUR=$(TZ='Asia/Shanghai' date '+%H')
          MODE="${{ github.event.inputs.mode || '' }}"

          # 如果是 cron 触发（没有手动输入），按北京时间自动选模式
          if [ -z "$MODE" ]; then
            if [ "$CURRENT_HOUR" -ge 8 ] && [ "$CURRENT_HOUR" -lt 11 ]; then
              MODE="09:00"
            elif [ "$CURRENT_HOUR" -ge 11 ] && [ "$CURRENT_HOUR" -lt 13 ]; then
              MODE="12:00"
            elif [ "$CURRENT_HOUR" -ge 13 ] && [ "$CURRENT_HOUR" -lt 15 ]; then
              MODE="14:30"
            else
              MODE="19:00"
            fi
          fi

          echo "=========================================="
          echo "  AI 量化投资简报"
          echo "=========================================="
          echo "北京时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "运行模式: $MODE"
          echo ""

          if [ "$MODE" = "notify" ]; then
            python -m src.notify
          else
            python -m src.briefing "$MODE"
          fi

      - name: 完成
        if: always()
        run: |
          echo ""
          echo "执行完成 @ $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
