name: 量化投资日报

on:
  # 定时触发 —— 每天北京时间 18:00 (UTC 10:00)，周一到周五
  schedule:
    - cron: '13 10 * * 1-5'

  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 完整流程：偏离度计算 + 宏观解读 + 推送飞书
          - deviation-only # 仅计算偏离度并写入飞书多维表格
          - brief-only    # 仅生成市场快报
      force_run:
        description: '强制执行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

# 并发控制：同一时间只运行一个任务
concurrency:
  group: quant-daily-run
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 随机延迟（避免固定时间集中请求）
        run: sleep $((RANDOM % 45))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs

      - name: 执行量化投资日报
        env:
          # ═══════════════════════════════════════
          # 大模型配置（DeepSeek 为主）
          # ═══════════════════════════════════════
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_BASE_URL: ${{ vars.DEEPSEEK_API_BASE_URL || 'https://api.deepseek.com' }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}

          # 硅基流动（票据 OCR 视觉模型）
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}

          # ═══════════════════════════════════════
          # 数据源配置
          # ═══════════════════════════════════════
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

          # ═══════════════════════════════════════
          # 搜索引擎（宏观事件获取）
          # ═══════════════════════════════════════
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}

          # ═══════════════════════════════════════
          # 飞书多维表格（核心数据库 + 看板）
          # ═══════════════════════════════════════
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_TOKEN: ${{ secrets.FEISHU_BITABLE_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}

          # 飞书群机器人 Webhook（可选，用于推送日报摘要）
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}

          # ═══════════════════════════════════════
          # 运行配置
          # ═══════════════════════════════════════
          LOG_LEVEL: INFO

        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"

          echo "=========================================="
          echo "  AI 量化投资日报系统"
          echo "=========================================="
          echo "时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "模式: $MODE"
          echo ""

          if [ "$MODE" = "brief-only" ]; then
            python main.py --brief
          elif [ "$MODE" = "deviation-only" ]; then
            python main.py --deviation-only
          else
            python main.py
          fi

      - name: 显示运行摘要
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "  执行完成 @ $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "=========================================="
