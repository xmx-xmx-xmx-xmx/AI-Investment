name: 量化投资简报

on:
  # 完全由飞书 Bot 通过 API 触发（或 GitHub 手动 workflow_dispatch）。
  # 时段对应：morning(08:30) / midday(11:30) / closing(14:30) / evening(20:30) / sat_morning / sun_evening / notify
  # evening 设在 20:30 是为了此时场外基金当日净值已陆续更新，日涨跌幅数据更准确。
  workflow_dispatch:
    inputs:
      mode:
        description: '手动运行模式'
        required: true
        default: 'closing'
        type: choice
        options:
          - morning
          - midday
          - closing
          - evening
          - sat_morning
          - sun_evening
          - notify

concurrency:
  group: quant-daily-run
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs

      - name: 运行
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_TOKEN: ${{ secrets.FEISHU_BITABLE_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LOG_LEVEL: INFO
        run: |
          # ── 极简逻辑：完全依赖飞书传参 ──
          # 如果没拿到参数（比如网页点运行没选），默认跑 closing 收盘前指令
          MODE="${{ github.event.inputs.mode || 'closing' }}"

          echo "=========================================="
          echo "  AI 量化投资系统 (纯净飞书接管版)"
          echo "=========================================="
          echo "北京时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "接收到飞书指令: $MODE"
          echo ""

          # ── Step 0: 底层账本维护（风雨无阻，不论什么模式都先对账） ──
          python -m src.pending_resolver

          # ── Step 1: 指令执行（传什么模式，跑什么脚本） ──
          case "$MODE" in
            notify)
              python -m src.notify
              ;;
            *)
              python -m src.briefing "$MODE"
              ;;
          esac

      - name: 完成
        if: always()
        run: |
          echo ""
          echo "执行完成 @ $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"