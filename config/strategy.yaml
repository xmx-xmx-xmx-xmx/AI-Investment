# ============================================================
# AI-Investment 策略配置 —— 唯一真源
# 修改此文件后重启即生效，无需改任何 Python 代码
# ============================================================

# ── 资产大类目标权重 ──
target_weights:
  固收资产: 0.50
  美股资产: 0.25
  A股资产: 0.10
  港股资产: 0.05
  避险商品: 0.10

# ── 阶梯阈值（偏离度判定） ──
thresholds:
  strong_buy: -0.10   # < -10%：极度低估，大额买入（300-500 元）
  buy: -0.05           # -10% ~ -5%：机会区间，加倍定投
  hold_high: 0.05      # -5% ~ +5%：正常范围
  soft_warn: 0.10      # +5% ~ +10%：轻度超配
  # > +10%：严重超配 → SELL（长底仓标签可覆盖为 HOLD）

# ── 冷却期 ──
cooldown:
  days: 3             # 同大类买入后 N 天内不重复建议

# ── 信号元数据（仅影响展示文案，不改逻辑） ──
signals:
  TRIGGER_STRONG_BUY:
    label: "🔴 强烈买入"
    intensity: strong
    explanation: "极度低估，建议大额买入或开启新仓（如投入 300-500 元）"
  TRIGGER_BUY:
    label: "🟡 加倍定投"
    intensity: normal
    explanation: "机会区间，建议将日常定投金额翻倍（如从 100→200 元）"
  HOLD_AND_WAIT:
    label: "✅ 维持节奏"
    intensity: mild
    explanation: "在正常波动范围内，维持现有小额定投节奏"
  TRIGGER_SELL:
    label: "🔺 建议止盈"
    intensity: strong
    explanation: "严重超配，建议停止定投、适度止盈（受标签约束）"

# ── 增量资金 ──
incremental:
  default_amount: 100        # 默认每期定投金额（元）
  max_amount: 200             # 加倍后上限（元）
  strong_buy_amount: 500      # 强烈买入时的上限（元）

# ── 心理防御（注入 LLM prompt 的固定文案） ──
psyche_facts:
  - "当前投入均为绝对闲钱，不影响日常生活质量。"
  - "所有投资均无杠杆、无借贷。"
  - "历史偏离度回归周期平均为 2-3 个月。"
  - "纪律执行的历史胜率高于情绪化操作。"

# ── ETF/指数名称映射表 ──
# 这些是行情抓取的"字典"，非策略逻辑，但也从代码中剥离
